// ══════════════════════════════════════════
//  閱讀器
// ══════════════════════════════════════════
function openViewer(file) {
  document.getElementById('viewerFrame').src = file;
  document.getElementById('viewerTitle').textContent = file;
  document.getElementById('viewer').classList.add('open');
  window.scrollTo(0, 0);
}
function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('viewerFrame').src = '';
}

// ══════════════════════════════════════════
//  篩選狀態
// ══════════════════════════════════════════
const dotClass = { pain: 'dot-pain', skill: 'dot-skill', trend: 'dot-trend', extra: 'dot-extra', default: 'dot-default' };
const typeLabel = { pain: '家長痛點', skill: '能力培養', trend: '科學趨勢', extra: '加值類別' };

// 台灣時間今天日期
const now = new Date();
const taiwanOffset = 8 * 60;
const utc = now.getTime() + now.getTimezoneOffset() * 60000;
const taiwanNow = new Date(utc + taiwanOffset * 60000);
const today = `${taiwanNow.getFullYear()}-${String(taiwanNow.getMonth()+1).padStart(2,'0')}-${String(taiwanNow.getDate()).padStart(2,'0')}`;

let currentDateFilter = 'all';  // 'all' | 'today'
let currentTypeFilter = '';     // '' | 'pain' | 'skill' | 'trend' | 'extra'
let currentSearch = '';         // keyword string
let activeTagBtn = null;        // 目前 active 的 tag 按鈕

// ══════════════════════════════════════════
//  渲染列表
// ══════════════════════════════════════════
function render() {
  const area = document.getElementById('contentArea');
  const empty = document.getElementById('emptyState');
  let list = [...articles].reverse();

  // 日期篩選
  if (currentDateFilter === 'today') list = list.filter(a => a.date === today);

  // 分類篩選（type）
  if (currentTypeFilter) {
    list = list.filter(a => a.topics.some(t => t.type === currentTypeFilter));
  }

  // 關鍵字搜尋
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(a =>
      a.topics.some(t => t.text.toLowerCase().includes(q)) ||
      a.file.includes(q) || a.time.includes(q)
    );
  }

  area.querySelectorAll('.date-group').forEach(el => el.remove());
  empty.style.display = list.length === 0 ? 'block' : 'none';

  const groups = {};
  list.forEach(a => { if (!groups[a.date]) groups[a.date] = []; groups[a.date].push(a); });

  // 預先建立「每篇文章在當天的篇數」對照表（依時間由早到晚 = 第 1 篇～第 N 篇）
  const nthByFile = {};
  const allByDate = {};
  articles.forEach(a => { (allByDate[a.date] = allByDate[a.date] || []).push(a); });
  Object.keys(allByDate).forEach(d => {
    allByDate[d]
      .slice()
      .sort((x, y) => x.time.localeCompare(y.time))
      .forEach((a, i) => { nthByFile[a.file] = i + 1; });
  });

  Object.keys(groups).sort().reverse().forEach(date => {
    const group = document.createElement('div');
    group.className = 'date-group';
    const d = new Date(date + 'T00:00:00');
    const label = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    group.innerHTML = `<div class="date-heading">${label} &nbsp;·&nbsp; ${groups[date].length} 份文宣</div>`;

    groups[date].forEach(a => {
      const card = document.createElement('div');
      card.className = 'article-card';
      card.onclick = () => openViewer(a.file);
      const tp = a.time.split(':');
      const nth = nthByFile[a.file];

      // 高亮符合分類的 topic
      const topicsHtml = a.topics.map(t => {
        const highlight = currentTypeFilter && t.type === currentTypeFilter;
        return `
          <div class="topic-line" style="${highlight ? 'font-weight:700;' : ''}">
            <div class="topic-dot ${dotClass[t.type] || 'dot-default'}"></div>
            <span>${highlightText(t.text, currentSearch)}</span>
            ${highlight ? `<span style="font-size:10px;padding:1px 7px;border-radius:10px;background:${typeColor(t.type)};color:#fff;margin-left:4px;flex-shrink:0;">${typeLabel[t.type]}</span>` : ''}
          </div>`;
      }).join('');

      card.innerHTML = `
        <div class="card-time-badge">
          <div class="nth">第 ${nth} 篇</div>
          <div class="time">｜${tp[0]}:${tp[1]}</div>
        </div>
        <div class="card-info">
          <div class="card-filename">${a.file}</div>
          <div class="card-topics">${topicsHtml}</div>
        </div>
        <div class="card-arrow">›</div>
      `;
      group.appendChild(card);
    });
    area.insertBefore(group, empty);
  });

  const allTopics = articles.reduce((s,a) => s + a.topics.filter(t => t.type !== 'default').length, 0);
  const days = new Set(articles.map(a => a.date)).size;
  document.getElementById('total-count').textContent = articles.length;
  document.getElementById('total-days').textContent = days;
  document.getElementById('total-topics').textContent = allTopics;
}

function typeColor(type) {
  return { pain: '#d97757', skill: '#7c5cbf', trend: '#2aa06b', extra: '#b89a38' }[type] || '#aaa';
}

function highlightText(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:#fff3cd;border-radius:3px;padding:0 2px;">$1</mark>');
}

// ══════════════════════════════════════════
//  篩選函數
// ══════════════════════════════════════════
function filterDate(type, btn) {
  currentDateFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// 主題標籤點擊
function tagFilter(val, btn) {
  const mode = btn.dataset.mode; // 'type' or 'kw'

  // 再次點同一個 → 取消
  if (activeTagBtn === btn) {
    activeTagBtn.classList.remove('active');
    activeTagBtn = null;
    currentTypeFilter = '';
    currentSearch = '';
    document.getElementById('searchInput').value = '';
    render();
    return;
  }

  // 清除舊的 active
  if (activeTagBtn) activeTagBtn.classList.remove('active');
  btn.classList.add('active');
  activeTagBtn = btn;

  if (mode === 'type') {
    currentTypeFilter = val;
    currentSearch = '';
    document.getElementById('searchInput').value = '';
  } else {
    currentTypeFilter = '';
    currentSearch = val;
    document.getElementById('searchInput').value = val;
  }
  render();
}

// 搜尋框輸入時清除 tag active
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  currentTypeFilter = '';
  if (activeTagBtn) { activeTagBtn.classList.remove('active'); activeTagBtn = null; }
  render();
});

render();
</script>
